name: CodeQL security scan

# GitHub-native static security analysis. Free on public repos; results appear in the repo's Security tab
# and are dated per run — an independent, verifiable signal that complements our own security test suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly, Monday 04:00 UTC.

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze PHP
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: php
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
