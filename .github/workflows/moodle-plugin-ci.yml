name: Moodle Plugin CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    # 5.1 floor and the 5.3-dev (main) preview are non-blocking monitors: they report without failing
    # the build. Promote a row to required by removing its `experimental: true` once it is confirmed green.
    continue-on-error: ${{ matrix.experimental || false }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Required — current target (Moodle 5.2) across both PHP versions and both databases.
          - {php: '8.3', moodle-branch: 'MOODLE_502_STABLE', database: 'pgsql'}
          - {php: '8.3', moodle-branch: 'MOODLE_502_STABLE', database: 'mariadb'}
          - {php: '8.4', moodle-branch: 'MOODLE_502_STABLE', database: 'pgsql'}
          - {php: '8.4', moodle-branch: 'MOODLE_502_STABLE', database: 'mariadb'}
          # Monitor — minimum-supported floor (Moodle 5.1).
          - {php: '8.3', moodle-branch: 'MOODLE_501_STABLE', database: 'pgsql', experimental: true}
          # Monitor — next LTS preview (development branch).
          - {php: '8.4', moodle-branch: 'main', database: 'pgsql', experimental: true}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      # This question type depends on the Grade Confidence engine; install it alongside.
      # While the engine repo is PRIVATE, CI needs a token to clone it: create a PAT with read access to
      # mouneyrac/moodle-aiplacement_gradeconfidence and add it as the repo secret CI_DEP_TOKEN. (If the
      # engine repo is later made public, the auth step below is a harmless no-op.)
      - name: Authenticate git for the private engine dependency
        env:
          CI_DEP_TOKEN: ${{ secrets.CI_DEP_TOKEN }}
        run: |
          if [ -n "$CI_DEP_TOKEN" ]; then
            git config --global url."https://x-access-token:${CI_DEP_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Add the engine plugin dependency
        run: moodle-plugin-ci add-plugin --branch main mouneyrac/moodle-aiplacement_gradeconfidence

      - name: Install moodle-plugin-ci
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome
